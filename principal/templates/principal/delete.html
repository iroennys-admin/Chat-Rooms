{% extends 'main.html' %}

{% block title %}Eliminar · ChatRooms{% endblock %}

{% block content %}
<form method="POST">
    {% csrf_token %}
    <div class="delete-item layout">
        <div class="container">
            <div class="layout__box">
                <div class="layout__boxHeader">
                    <div class="layout__boxTitle">
                        <a href="{% url 'home' %}">
                            <svg width="24" height="24" viewBox="0 0 24 24">
                                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                            </svg>
                        </a>
                        <h3>Confirmar eliminación</h3>
                    </div>
                </div>
                <div class="layout__body">
                    <p class="auth__tagline">¿Estás seguro de que deseas eliminar <strong>"{{ obj }}"</strong>?</p>
                    <p style="color:var(--color-error);font-size:1.4rem;margin-bottom:2rem;">Esta acción no se puede deshacer.</p>
                    <div class="form__action">
                        <a href="javascript:history.go(-1)" class="btn btn--dark">Cancelar</a>
                        <button type="submit" class="btn btn--main" style="background:var(--color-error);">Sí, eliminar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</form>
{% endblock %}
