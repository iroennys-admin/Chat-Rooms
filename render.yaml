services:
  - type: web
    name: chat-rooms
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn miproyecto.wsgi --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    preDeployCommand: python manage.py migrate
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: chat-rooms-db
          property: connectionString

databases:
  - name: chat-rooms-db
    plan: free
    databaseName: chatrooms
